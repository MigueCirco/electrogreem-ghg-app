<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElectroGreem – Inventario GHG operativo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <svg class="logo" viewBox="0 0 120 120" role="img" aria-label="Logo ElectroGreem">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#27f58d" />
              <stop offset="100%" stop-color="#15a55d" />
            </linearGradient>
          </defs>
          <rect x="8" y="8" width="104" height="104" rx="20" fill="#0f1f17" stroke="url(#g)" stroke-width="6" />
          <path d="M36 72h16l8-22 8 14h16" fill="none" stroke="url(#g)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="36" cy="72" r="4" fill="#27f58d" />
          <circle cx="84" cy="64" r="4" fill="#27f58d" />
        </svg>
        <div>
          <h1 id="brand-title">ElectroGreem – Inventario GHG</h1>
          <p id="brand-subtitle">Aplicación operativa con CRUD, trazabilidad y respaldo local</p>
        </div>
      </div>
      <span id="brand-badge" class="badge">Operativo · Español (AR)</span>
    </header>

    <nav class="tabs" id="tabs"></nav>

    <main>
      <section class="tab-panel" data-tab="dashboard"></section>
      <section class="tab-panel" data-tab="scope2"></section>
      <section class="tab-panel" data-tab="scope3"></section>
      <section class="tab-panel" data-tab="factores"></section>
      <section class="tab-panel" data-tab="evidencias"></section>
      <section class="tab-panel" data-tab="reportes"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
