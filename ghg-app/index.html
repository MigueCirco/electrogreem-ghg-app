<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElectroGreem | Inventario GHG operativo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <svg class="logo" viewBox="0 0 120 120" role="img" aria-label="Logo ElectroGreem">
          <defs>
            <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#6f8f6f" />
              <stop offset="100%" stop-color="#4f6f50" />
            </linearGradient>
          </defs>
          <rect x="8" y="8" width="104" height="104" rx="20" fill="#ebe1d1" stroke="url(#g)" stroke-width="6" />
          <path d="M36 72h16l8-22 8 14h16" fill="none" stroke="url(#g)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="36" cy="72" r="4" fill="#6f8f6f" />
          <circle cx="84" cy="64" r="4" fill="#6f8f6f" />
        </svg>
        <div>
          <h1>ElectroGreem · Inventario GHG</h1>
          <p>PPS Ingeniería Electrónica (UTN-FRT) · Auditoría Scope 1/2/3</p>
        </div>
      </div>
      <span class="badge">Operativo · Español (AR)</span>
    </header>

    <nav class="tabs" id="tabs"></nav>

    <main>
      <section class="tab-panel" data-tab="inicio"></section>
      <section class="tab-panel" data-tab="scope1"></section>
      <section class="tab-panel" data-tab="scope2"></section>
      <section class="tab-panel" data-tab="scope3"></section>
      <section class="tab-panel" data-tab="factores"></section>
      <section class="tab-panel" data-tab="evidencias"></section>
      <section class="tab-panel" data-tab="reportes"></section>
      <section class="tab-panel" data-tab="config"></section>
    </main>

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
